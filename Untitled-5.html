<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traductor de Idiomas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 900px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .translator-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-group, .output-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        select, textarea {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-family: Arial, sans-serif;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        select {
            margin-bottom: 15px;
            cursor: pointer;
            background-color: white;
        }

        textarea {
            resize: vertical;
            min-height: 150px;
            padding: 15px;
        }

        #inputText {
            border: 2px solid #ddd;
        }

        #outputText {
            background-color: #f9f9f9;
            color: #333;
            border: 2px solid #ddd;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        #translateBtn {
            background-color: #667eea;
            color: white;
            flex: 1;
            max-width: 200px;
        }

        #translateBtn:hover {
            background-color: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        #clearBtn {
            background-color: #f59e0b;
            color: white;
            flex: 1;
            max-width: 200px;
        }

        #clearBtn:hover {
            background-color: #d97706;
            transform: translateY(-2px);
        }

        #copyBtn {
            background-color: #18f8ad;
            color: white;
            flex: 1;
            max-width: 200px;
        }

        #copyBtn:hover {
            background-color: #0ff3ab;
            transform: translateY(-2px);
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-weight: 600;
            display: none;
        }

        .error {
            background-color: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #c33;
            display: none;
        }

        .success {
            background-color: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #3c3;
            display: none;
        }

        @media (max-width: 768px) {
            .translator-box {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.8em;
            }

            .container {
                padding: 20px;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                max-width: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 Traductor de Idiomas</h1>

        <div class="error" id="errorMsg"></div>
        <div class="success" id="successMsg"></div>

        <div class="translator-box">
            <!-- ENTRADA (Lado izquierdo) -->
            <div class="input-group">
                <label for="inputLang">Idioma de Origen:</label>
                <select id="inputLang">
                    <option value="es">Español</option>
                    <option value="en">Inglés</option>
                    <option value="fr">Francés</option>
                    <option value="de">Alemán</option>
                    <option value="it">Italiano</option>
                    <option value="pt">Portugués</option>
                    <option value="ja">Japonés</option>
                    <option value="zh">Chino</option>
                    <option value="ko">Coreano</option>
                    <option value="ru">Ruso</option>
                    <option value="ar">Árabe</option>
                </select>

                <label for="inputText">Texto a Traducir:</label>
                <textarea id="inputText" placeholder="Escribe el texto que deseas traducir..."></textarea>
            </div>

            <!-- SALIDA (Lado derecho) -->
            <div class="output-group">
                <label for="outputLang">Idioma de Destino:</label>
                <select id="outputLang">
                    <option value="en">Inglés</option>
                    <option value="es">Español</option>
                    <option value="fr">Francés</option>
                    <option value="de">Alemán</option>
                    <option value="it">Italiano</option>
                    <option value="pt">Portugués</option>
                    <option value="ja">Japonés</option>
                    <option value="zh">Chino</option>
                    <option value="ko">Coreano</option>
                    <option value="ru">Ruso</option>
                    <option value="ar">Árabe</option>
                </select>

                <label for="outputText">Texto Traducido:</label>
                <textarea id="outputText" placeholder="Aquí aparecerá la traducción..." readonly></textarea>
            </div>
        </div>

        <div class="loading" id="loading">⏳ Traduciendo...</div>

        <div class="button-group">
            <button id="translateBtn">🔄 Traducir</button>
            <button id="copyBtn">📋 Copiar Resultado</button>
            <button id="clearBtn">🗑️ Limpiar</button>
        </div>
    </div>

    <script>
        // Códigos de idiomas para la API
        const languages = {
            es: 'es',
            en: 'en',
            fr: 'fr',
            de: 'de',
            it: 'it',
            pt: 'pt',
            ja: 'ja',
            zh: 'zh',
            ko: 'ko',
            ru: 'ru',
            ar: 'ar'
        };

        // Elementos del DOM
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const inputLang = document.getElementById('inputLang');
        const outputLang = document.getElementById('outputLang');
        const translateBtn = document.getElementById('translateBtn');
        const copyBtn = document.getElementById('copyBtn');
        const clearBtn = document.getElementById('clearBtn');
        const loading = document.getElementById('loading');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        // Función para traducir
        async function translate() {
            const text = inputText.value.trim();

            if (!text) {
                showError('Por favor, escribe algo para traducir');
                return;
            }

            const from = inputLang.value;
            const to = outputLang.value;

            if (from === to) {
                showError('Selecciona idiomas diferentes');
                return;
            }

            loading.style.display = 'block';
            errorMsg.style.display = 'none';

        try {
            // Usando la API de MyMemory (gratuita, sin autenticación)
            const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`;
            
            const response = await fetch(url);
            const data = await response.json();

            if (data.responseStatus === 200) {
                outputText.value = data.responseData.translatedText;
                showSuccess('¡Traducción completada!');
            } else {
                showError('Error en la traducción. Intenta de nuevo.');
            }
        } catch (error) {
            showError('Error de conexión. Verifica tu internet.');
            console.error(error);
        } finally {
            loading.style.display = 'none';
        }
    }

        // Función para copiar al portapapeles
        function copyToClipboard() {
            const text = outputText.value.trim();

            if (!text) {
                showError('No hay texto para copiar');
                return;
            }

            navigator.clipboard.writeText(text).then(() => {
                showSuccess('✅ ¡Copiado al portapapeles!');
            }).catch(() => {
                showError('Error al copiar');
            });
        }

        // Función para limpiar
        function clear() {
            inputText.value = '';
            outputText.value = '';
            inputText.focus();
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
        }

        // Función para mostrar errores
        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
            successMsg.style.display = 'none';
        }

        // Función para mostrar éxito
        function showSuccess(message) {
            successMsg.textContent = message;
            successMsg.style.display = 'block';
            errorMsg.style.display = 'none';
        }

        // Event Listeners
        translateBtn.addEventListener('click', translate);
        copyBtn.addEventListener('click', copyToClipboard);
        clearBtn.addEventListener('click', clear);

        // Traducir con Enter
        inputText.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                translate();
            }
        });

        // Permitir Tab dentro del textarea
        inputText.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = inputText.selectionStart;
                const end = inputText.selectionEnd;
                inputText.value = inputText.value.substring(0, start) + '\t' + inputText.value.substring(end);
                inputText.selectionStart = inputText.selectionEnd = start + 1;
            }
        });
    </script>
</body>
</html>
